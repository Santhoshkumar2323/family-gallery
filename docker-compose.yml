services:
  mysql:
    image: mysql:8.0
    container_name: family-gallery-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: family_gallery
      MYSQL_USER: gallery_user
      MYSQL_PASSWORD: gallery_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: